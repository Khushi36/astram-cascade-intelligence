name: Lint & Syntax Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Lint app.py
        run: ruff check app.py resource_optimizer.py --select=E,F --ignore=E501,E402,F401
      - name: Check requirements.txt exists
        run: test -f requirements.txt
      - name: Check runtime.txt exists
        run: test -f runtime.txt
